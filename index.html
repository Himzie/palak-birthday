<!DOCTYPE html>
<html>
<head>
  <title>Palak: The Series 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* INTRO ANIMATION */
    #intro {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .netflix-n {
      font-size: 120px;
      font-weight: bold;
      color: red;
      animation: reveal 2s ease forwards;
    }

    @keyframes reveal {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* PROFILE SCREEN */
    #profiles {
      display: none;
      text-align: center;
    }

    .profile {
      margin-top: 20px;
      cursor: pointer;
    }

    .profile img {
      width: 120px;
      border-radius: 10px;
    }

    /* MAIN */
    #main {
      display: none;
      padding: 20px;
    }

    h1 {
      margin-left: 20px;
    }

    /* NETFLIX CARD */
    .hero {
      position: relative;
      margin: 40px;
      height: 250px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .hero:hover {
      transform: scale(1.05);
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .hero:hover video {
      display: block;
    }

    .hero-content {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    .play-btn {
      padding: 10px 20px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    /* EPISODES */
    .episodes {
      display: none;
      padding: 20px;
    }

    .episode {
      margin: 10px 0;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="netflix-n">N</div>
</div>

<!-- PROFILES -->
<div id="profiles">
  <h2>Who’s watching?</h2>

  <div class="profile" onclick="enterSite()">
    <img src="https://i.pinimg.com/736x/9b/5d/6e/9b5d6e6d5b0a3b7b2d6d3e6e6e6e6e.jpg">
    <p>Palak 💖</p>
  </div>
</div>

<!-- MAIN -->
<div id="main">

<h1>Palak: The Series</h1>

<div class="hero" onclick="showEpisodes()">
  <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop></video>

  <div class="hero-content">
    <h2>Palak: The Series 💖</h2>
    <button class="play-btn">Play</button>
  </div>
</div>

</div>

<!-- EPISODES -->
<div id="episodes" class="episodes">
  <h2>Episodes</h2>

  <div class="episode">Episode 1: The Beginning 💖</div>
  <div class="episode">Episode 2: Chaos Era 😭</div>
  <div class="episode">Episode 3: The Real Part 💌</div>
</div>

<!-- AUDIO -->
<audio id="tudum" src="https://www.myinstants.com/media/sounds/netflix-tudum.mp3"></audio>

<script>

/* INTRO FLOW */
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
  document.getElementById("profiles").style.display = "block";
}, 2000);

function enterSite() {
  document.getElementById("tudum").play();
  document.getElementById("profiles").style.display = "none";
  document.getElementById("main").style.display = "block";
}

/* SHOW EPISODES */
function showEpisodes() {
  document.getElementById("episodes").style.display = "block";
}

</script>

</body>
</html>
